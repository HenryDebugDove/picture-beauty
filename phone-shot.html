<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实拍感 · PC 网页截图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0c;
      --grain-opacity: 0.042;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: #e8e8ec;
      overflow-x: hidden;
      display: grid;
      place-items: center;
      padding: clamp(1.25rem, 4vw, 2.5rem);
    }

    .scene {
      position: relative;
      width: min(1200px, 96vw);
      perspective: 1400px;
      perspective-origin: 50% 42%;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -35% -50%;
      background:
        radial-gradient(ellipse 85% 55% at 50% 18%, rgba(99, 102, 241, 0.16), transparent 58%),
        radial-gradient(ellipse 65% 50% at 75% 85%, rgba(236, 72, 153, 0.07), transparent 52%),
        radial-gradient(ellipse 55% 45% at 15% 75%, rgba(34, 211, 238, 0.05), transparent 48%);
      pointer-events: none;
      z-index: 0;
    }

    /* 整块画面轻微透视（无手机壳，适合横版网页图） */
    .device-wrap {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      transition: transform 0.12s ease-out;
      will-change: transform;
    }

    .device-wrap.hand-tilt {
      transform: rotateX(var(--rx, 5deg)) rotateY(var(--ry, -7deg)) rotateZ(var(--rz, -1deg))
        translateZ(0);
    }

    /* 仅一层「浮起的网页截图」：圆角 + 阴影，比例完全跟随图片 */
    .shot-panel {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #08080a;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 40px 80px -24px rgba(0, 0, 0, 0.72),
        0 24px 48px -28px rgba(99, 102, 241, 0.18);
    }

    .shot-panel img {
      width: 100%;
      height: auto;
      display: block;
      filter: saturate(1.04) contrast(1.02);
    }

    /* 实拍感：屏幕反光 */
    .shot-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        118deg,
        rgba(255, 255, 255, 0.1) 0%,
        transparent 30%,
        transparent 68%,
        rgba(255, 255, 255, 0.025) 100%
      );
      pointer-events: none;
      mix-blend-mode: soft-light;
    }

    .vignette {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(
        ellipse 88% 78% at 50% 48%,
        transparent 42%,
        rgba(0, 0, 0, 0.28) 100%
      );
      z-index: 2;
    }

    .chromatic {
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      z-index: 3;
      opacity: 0.28;
      mix-blend-mode: screen;
      background:
        linear-gradient(90deg, rgba(255, 0, 0, 0.025), transparent 18%, transparent 82%, rgba(0, 255, 255, 0.025));
    }

    .grain {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: 4;
      opacity: var(--grain-opacity);
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      animation: grain-shift 8s steps(10) infinite;
    }

    @keyframes grain-shift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-2%, 3%); }
      50% { transform: translate(2%, -2%); }
      75% { transform: translate(-1%, -1%); }
    }

    .reflection {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 22%;
      bottom: -14%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.1), transparent 72%);
      filter: blur(28px);
      opacity: 0.85;
      z-index: 0;
      transform: scaleY(0.4);
      pointer-events: none;
    }

    .caption {
      margin-top: 1.75rem;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .caption h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.92;
    }

    .caption p {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: rgba(232, 232, 236, 0.45);
      max-width: 36rem;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: rgba(232, 232, 236, 0.28);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 3;
    }

    .toolbar button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.55rem 1.15rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      color: #e8e8ec;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }

    .toolbar button:hover:not(:disabled) {
      border-color: rgba(99, 102, 241, 0.45);
      background: linear-gradient(180deg, rgba(99, 102, 241, 0.2), rgba(99, 102, 241, 0.06));
    }

    .toolbar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .export-status {
      font-size: 0.78rem;
      color: rgba(232, 232, 236, 0.5);
      min-height: 1.25em;
    }

    .shot-panel img[data-error] {
      padding: 2rem;
      opacity: 0.5;
      max-height: 40vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="toolbar">
      <button type="button" id="btn-export" disabled>导出 PNG</button>
      <span class="export-status" id="export-status" aria-live="polite"></span>
    </div>
    <div class="reflection" aria-hidden="true"></div>
    <div class="device-wrap hand-tilt" id="device">
      <div class="shot-panel">
        <img
          id="shot"
          src="default.png"
          alt="网页截图"
          decoding="async"
        />
        <div class="vignette" aria-hidden="true"></div>
        <div class="chromatic" aria-hidden="true"></div>
        <div class="grain" aria-hidden="true"></div>
      </div>
    </div>
    <div class="caption">
      <h1>PC 网页截图 · 实拍质感</h1>
      <p>
        已去掉手机壳；图片按原始宽高比铺满展示。保留轻微透视、暗角、颗粒与环境光，适合桌面端网站整页或窗口截图。
        移动鼠标可微调倾斜。
      </p>
      <p class="hint">
        导出：Chrome / Edge 下可弹出「另存为」，请选择本项目文件夹（例如 shipai）保存。
        若导出空白或失败，请用本地静态服务打开本页（不要用纯 file://）。
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    (function () {
      var device = document.getElementById("device");
      var img = document.getElementById("shot");
      var btnExport = document.getElementById("btn-export");
      var exportStatus = document.getElementById("export-status");
      var shotPanel = document.querySelector(".shot-panel");
      var scene = document.querySelector(".scene");

      function setExportReady() {
        btnExport.disabled = !img.complete || img.naturalWidth === 0 || img.hasAttribute("data-error");
      }

      img.addEventListener("load", setExportReady);
      img.addEventListener("error", function () {
        img.alt = "请放置 default.png";
        img.setAttribute("data-error", "1");
        setExportReady();
      });
      setExportReady();

      var baseRx = 5;
      var baseRy = -7;
      var baseRz = -1;

      function clamp(n, min, max) {
        return Math.min(max, Math.max(min, n));
      }

      function onMove(e) {
        var w = window.innerWidth;
        var h = window.innerHeight;
        var cx = e.clientX / w - 0.5;
        var cy = e.clientY / h - 0.5;
        var rx = baseRx + clamp(-cy * 10, -8, 8);
        var ry = baseRy + clamp(cx * 12, -10, 10);
        var rz = baseRz + clamp(cx * 3 - cy * 1.5, -3, 3);
        device.style.setProperty("--rx", rx.toFixed(2) + "deg");
        device.style.setProperty("--ry", ry.toFixed(2) + "deg");
        device.style.setProperty("--rz", rz.toFixed(2) + "deg");
      }

      function onLeave() {
        device.style.setProperty("--rx", baseRx + "deg");
        device.style.setProperty("--ry", baseRy + "deg");
        device.style.setProperty("--rz", baseRz + "deg");
      }

      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerleave", onLeave);

      window.addEventListener("pointermove", function (e) {
        var x = (e.clientX / window.innerWidth - 0.5) * 16;
        var y = (e.clientY / window.innerHeight - 0.5) * 16;
        scene.style.transform = "translate(" + x.toFixed(1) + "px, " + y.toFixed(1) + "px)";
      });

      function pad2(n) {
        return n < 10 ? "0" + n : String(n);
      }

      function defaultFilename() {
        var d = new Date();
        return (
          "shipai-render-" +
          d.getFullYear() +
          pad2(d.getMonth() + 1) +
          pad2(d.getDate()) +
          "-" +
          pad2(d.getHours()) +
          pad2(d.getMinutes()) +
          pad2(d.getSeconds()) +
          ".png"
        );
      }

      async function savePngBlob(blob, suggestedName) {
        if (window.showSaveFilePicker) {
          try {
            var handle = await window.showSaveFilePicker({
              suggestedName: suggestedName,
              types: [
                {
                  description: "PNG 图片",
                  accept: { "image/png": [".png"] },
                },
              ],
            });
            var writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return true;
          } catch (err) {
            if (err && err.name === "AbortError") {
              return false;
            }
          }
        }
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = suggestedName;
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        return true;
      }

      btnExport.addEventListener("click", async function () {
        if (btnExport.disabled || typeof html2canvas !== "function") {
          exportStatus.textContent =
            typeof html2canvas !== "function"
              ? "未加载 html2canvas，请检查网络后刷新。"
              : "";
          return;
        }

        btnExport.disabled = true;
        exportStatus.textContent = "正在渲染…";

        var prevDevice = device.style.cssText;
        var prevScene = scene.style.cssText;
        device.style.cssText = "";
        scene.style.transform = "";
        device.classList.remove("hand-tilt");

        await new Promise(function (r) {
          requestAnimationFrame(function () {
            requestAnimationFrame(r);
          });
        });

        try {
          var canvas = await html2canvas(shotPanel, {
            scale: Math.min(2, (window.devicePixelRatio || 1) * 2),
            useCORS: true,
            allowTaint: false,
            backgroundColor: "#08080a",
            logging: false,
          });
          var blob = await new Promise(function (resolve, reject) {
            canvas.toBlob(function (b) {
              if (b) {
                resolve(b);
              } else {
                reject(new Error("toBlob failed"));
              }
            }, "image/png");
          });
          var name = defaultFilename();
          var saved = await savePngBlob(blob, name);
          exportStatus.textContent = saved
            ? "已保存：" + name + (window.showSaveFilePicker ? "（位置由你选择的文件夹决定）" : "（一般在「下载」文件夹）")
            : "已取消保存";
        } catch (err) {
          exportStatus.textContent =
            "导出失败：" +
            (err && err.message ? err.message : String(err)) +
            "。请用本地服务器打开本页（例如在项目目录执行 npx serve 或 python -m http.server），再试一次。";
        } finally {
          device.style.cssText = prevDevice;
          scene.style.cssText = prevScene;
          device.classList.add("hand-tilt");
          btnExport.disabled = false;
          setExportReady();
        }
      });
    })();
  </script>
</body>
</html>
